<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }}</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>{{ app_name }}</h1>
        <p class="subtext">
          Paste a <strong>Mobifliks</strong>, <strong>Ugaflix</strong>, <strong>Pearl Pix</strong>, or <strong>Namzentertainment</strong> URL.
          Movies, single TV episodes, and full TV show pages are auto-detected, then validated against direct download links.
        </p>

        <form id="resolve-form">
          <label for="url">URL (movie, series page, episode page, or supported resolver URL)</label>
          <input
            id="url"
            name="url"
            type="url"
            required
            placeholder="https://www.mobifliks.com/downloadseries2.php?... or https://www.mobifliks.com/downloadepisode2.php?..."
          />

          <div class="row">
            <div>
              <label for="timeout">Timeout (seconds)</label>
              <input id="timeout" name="timeout" type="number" min="5" max="60" value="20" />
            </div>
            <div>
              <label for="retries">Retries</label>
              <input id="retries" name="retries" type="number" min="0" max="4" value="1" />
            </div>
          </div>

          <button id="submit-btn" type="submit">Resolve Download URL</button>
        </form>

        <div id="status" class="status hidden"></div>
        <div id="result" class="result hidden"></div>
      </section>
    </main>

    <script>
      const form = document.getElementById("resolve-form");
      const resultBox = document.getElementById("result");
      const statusBox = document.getElementById("status");
      const submitBtn = document.getElementById("submit-btn");

      function setStatus(message, type) {
        statusBox.className = `status ${type || ""}`;
        statusBox.textContent = message;
        statusBox.classList.remove("hidden");
      }

      function showResult(html) {
        resultBox.innerHTML = html;
        resultBox.classList.remove("hidden");
      }

      function escapeHtml(input) {
        return String(input ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function renderCheckDetails(checks) {
        if (!checks || !checks.length) {
          return `<p class="meta">No candidates generated.</p>`;
        }

        const items = checks
          .map((item) => `<li><code>${escapeHtml(item.url)}</code> &rarr; status: ${item.status ?? "N/A"}</li>`)
          .join("");

        return `
          <details class="check-details">
            <summary>Checked ${checks.length} candidate${checks.length === 1 ? "" : "s"}</summary>
            <ul class="check-list">${items}</ul>
          </details>
        `;
      }

      function renderMovieResult(data) {
        const meta = data.parsed.raw_vid_name != null
          ? data.parsed.raw_vid_name
          : (data.parsed.prev_url
            ? (data.parsed.title_from_page || data.parsed.title_from_slug || "Namz")
            : (data.parsed.title_from_page || data.parsed.title_from_slug || data.parsed.slug || ""));

        if (data.ok) {
          return `
            <h3>Direct download URL</h3>
            <p><a href="${escapeHtml(data.download_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(data.download_url)}</a></p>
            <p class="meta"><strong>Movie:</strong> ${escapeHtml(meta)}</p>
          `;
        }

        return `
          <h3>Checked candidates</h3>
          ${renderCheckDetails(data.checks || [])}
        `;
      }

      function renderEpisodeResult(data) {
        const episode = (data.episodes && data.episodes[0]) || {};
        const seriesName = data.parsed.raw_series_name || data.parsed.series_name || data.parsed.title || "";
        const watchLink = episode.watch_url
          ? `<p><strong>Watch page:</strong> <a href="${escapeHtml(episode.watch_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(episode.watch_url)}</a></p>`
          : "";
        const downloadBlock = episode.download_url
          ? `<p><strong>Download URL:</strong> <a href="${escapeHtml(episode.download_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(episode.download_url)}</a></p>`
          : `<p><strong>Download URL:</strong> <span class="badge badge-muted">Not resolved</span></p>`;

        return `
          <h3>Episode result</h3>
          <div class="episode-card">
            <p><strong>Series:</strong> ${escapeHtml(seriesName)}</p>
            <p><strong>Episode #:</strong> ${escapeHtml(episode.episode_number ?? data.parsed.episode_number ?? "")}</p>
            <p><strong>Title:</strong> ${escapeHtml(episode.episode_title ?? data.parsed.episode_title ?? "")}</p>
            ${watchLink}
            ${downloadBlock}
            ${!episode.download_url ? renderCheckDetails(episode.checks || data.checks || []) : ""}
          </div>
        `;
      }

      function renderSeriesResult(data) {
        const episodes = data.episodes || [];
        const resolvedCount = episodes.filter((episode) => episode.ok).length;
        const seriesName = data.parsed.raw_series_name || data.parsed.title || "";
        const rows = episodes.map((episode) => {
          const watchCell = episode.watch_url
            ? `<a href="${escapeHtml(episode.watch_url)}" target="_blank" rel="noopener noreferrer">Watch page</a>`
            : `<span class="badge badge-muted">N/A</span>`;
          const downloadCell = episode.download_url
            ? `<a href="${escapeHtml(episode.download_url)}" target="_blank" rel="noopener noreferrer">Download</a>`
            : `<span class="badge badge-muted">Not resolved</span>${renderCheckDetails(episode.checks || [])}`;
          const statusClass = episode.ok ? "badge-success" : "badge-muted";
          const statusLabel = episode.ok ? `200 OK` : `Failed`;

          return `
            <tr>
              <td>${escapeHtml(episode.episode_number ?? "")}</td>
              <td>${escapeHtml(episode.episode_title ?? "")}</td>
              <td>${watchCell}</td>
              <td>${downloadCell}</td>
              <td><span class="badge ${statusClass}">${escapeHtml(statusLabel)}</span></td>
            </tr>
          `;
        }).join("");

        return `
          <h3>Series episodes</h3>
          <p class="meta"><strong>Series:</strong> ${escapeHtml(seriesName)}</p>
          <p class="meta"><strong>Resolved:</strong> ${resolvedCount} of ${episodes.length} episode${episodes.length === 1 ? "" : "s"}</p>
          ${episodes.length ? `
            <div class="table-wrap">
              <table class="episode-table">
                <thead>
                  <tr>
                    <th>#</th>
                    <th>Episode</th>
                    <th>Watch</th>
                    <th>Download</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          ` : `<p class="meta">No episodes were discovered on this series page.</p>`}
        `;
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        resultBox.classList.add("hidden");
        setStatus("Resolving and validating candidates...", "loading");
        submitBtn.disabled = true;

        const payload = {
          url: document.getElementById("url").value.trim(),
          timeout: Number(document.getElementById("timeout").value || 20),
          retries: Number(document.getElementById("retries").value || 1),
          fetch_page: true,
        };

        try {
          const response = await fetch("/api/resolve", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok) {
            const detail = data && data.detail ? String(data.detail) : "Request failed.";
            setStatus(detail, "error");
            return;
          }

          if (data.content_kind === "series") {
            const episodes = data.episodes || [];
            const resolvedCount = episodes.filter((episode) => episode.ok).length;
            if (data.ok) {
              setStatus(`Validated ${resolvedCount} of ${episodes.length} episodes.`, "success");
            } else if (episodes.length) {
              setStatus(`Discovered ${episodes.length} episodes, but none validated successfully.`, "error");
            } else {
              setStatus("No series episodes were discovered on this page.", "error");
            }
            showResult(renderSeriesResult(data));
            return;
          }

          if (data.content_kind === "episode") {
            if (data.ok) {
              setStatus("Validated successfully: 200 OK (episode)", "success");
            } else {
              setStatus("No validated download URL found for this episode.", "error");
            }
            showResult(renderEpisodeResult(data));
            return;
          }

          if (data.ok) {
            setStatus("Validated successfully: 200 OK (" + (data.resolver || "resolver") + ")", "success");
          } else {
            setStatus("No validated download URL found for this detail page.", "error");
          }
          showResult(renderMovieResult(data));
        } catch (error) {
          setStatus("Network error while contacting resolver API.", "error");
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
